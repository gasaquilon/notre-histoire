/* === Aquilon & Co — Page Histoire (Cockpit de nuit) === */

:root {
  --bg: #ffffff;
  --bg-2: #f7f7f5;
  --bg-3: #efefec;
  --ink: #0a0a0a;
  --ink-dim: rgba(10,10,10,0.72);
  --ink-faint: rgba(10,10,10,0.5);
  --line: rgba(0,0,0,0.1);
  --line-2: rgba(0,0,0,0.18);
  --accent: #0c2340;
  --accent-glow: rgba(12,35,64,0.22);
  --accent-soft: rgba(12,35,64,0.05);

  --hero-title: clamp(56px, 10vw, 128px);
  --chapter-title: clamp(36px, 5.2vw, 64px);
  --pull-quote: clamp(28px, 4.6vw, 56px);
  --quote-text: clamp(34px, 5.5vw, 72px);
  --body: clamp(16px, 1.4vw, 19px);
  --body-lg: clamp(20px, 2vw, 28px);

  --gutter: clamp(20px, 4vw, 80px);
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body {
  overflow-x: hidden;
  overflow-y: scroll;
  scrollbar-width: thin;
  scrollbar-color: #aaa #ffffff;
}

::selection { background: var(--accent); color: #fff; }

a { color: inherit; text-decoration: none; }

em { font-style: italic; font-weight: inherit; }

/* === Background ambient === */
.ac-grid-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(0,0,0,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.045) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse at center top, #000 0%, #000 50%, transparent 90%);
  -webkit-mask-image: radial-gradient(ellipse at center top, #000 0%, #000 50%, transparent 90%);
}
.ac-scanlines {
  position: fixed; inset: 0; pointer-events: none; z-index: 1;
  background: repeating-linear-gradient(0deg, transparent 0 3px, rgba(0,0,0,0.015) 3px 4px);
}
.ac-page { position: relative; z-index: 2; }

/* === Nav === */
.ac-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px var(--gutter);
  border-bottom: 1px solid var(--line);
  font-size: 11px; letter-spacing: 0.18em; font-weight: 500;
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.ac-nav-logo { font-weight: 700; letter-spacing: 0.2em; font-size: 13px; }
.ac-nav-logo span { opacity: 0.5; }
.ac-nav-links { display: flex; gap: 36px; opacity: 0.7; }
.ac-nav-links a { transition: color .3s, opacity .3s; }
.ac-nav-links a:hover { color: var(--accent); opacity: 1; }
.ac-nav-meta { opacity: 0.5; }

/* === Hero === */
.ac-hero {
  position: relative;
  padding: clamp(40px, 6vw, 80px) var(--gutter) clamp(60px, 8vw, 120px);
  min-height: calc(100vh - 70px);
  display: flex; flex-direction: column;
}
.ac-hero-content {
  display: grid; grid-template-columns: 1.3fr 1fr; gap: clamp(40px, 6vw, 80px);
  align-items: center; flex: 1;
  padding-top: clamp(40px, 6vw, 100px);
}
.ac-eyebrow {
  display: flex; align-items: center; gap: 12px;
  font-size: 11px; letter-spacing: 0.24em; color: var(--accent);
  font-weight: 600; margin-bottom: 36px;
}
.ac-eyebrow-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: ac-pulse 2.4s ease-in-out infinite;
}
@keyframes ac-pulse { 0%,100% { opacity: 0.85; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }

.ac-hero-title {
  font-family: Inter; font-weight: 200;
  font-size: var(--hero-title); line-height: 0.95; letter-spacing: -0.04em;
  margin: 0 0 32px;
}
.ac-hero-title em {
  font-weight: 300; color: var(--accent);
  text-shadow: 0 0 32px var(--accent-glow);
}
.ac-hero-lead {
  font-size: clamp(16px, 1.6vw, 20px); line-height: 1.6;
  opacity: 0.75; max-width: 540px; font-weight: 300;
  margin: 0 0 56px;
  text-wrap: pretty;
}

.ac-spec-strip {
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--line-2); border-bottom: 1px solid var(--line-2);
  max-width: 540px;
}
.ac-spec { padding: 16px 0; border-right: 1px solid var(--line); }
.ac-spec:last-child { border-right: none; }
.ac-spec-val { font-size: clamp(18px, 1.8vw, 22px); font-weight: 400; letter-spacing: 0.02em; }
.ac-spec-lbl { font-size: 9px; letter-spacing: 0.2em; opacity: 0.45; margin-top: 4px; }

.ac-horizon-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.ac-horizon-svg { width: 100%; max-width: 420px; height: auto; display: block; }
.ac-horizon-caption {
  text-align: center; font-size: 10px; letter-spacing: 0.2em;
  color: var(--accent); font-weight: 600; line-height: 1.6;
}
.ac-horizon-caption .dim { opacity: 0.5; color: var(--ink); font-weight: 500; }

.ac-hero-foot {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: clamp(40px, 6vw, 80px);
  padding-top: 20px;
  border-top: 1px solid var(--line);
  font-size: 10px; letter-spacing: 0.22em; opacity: 0.6;
}
.ac-hero-foot .scroll-hint { display: inline-flex; align-items: center; gap: 8px; }
.ac-hero-foot .scroll-hint::after {
  content: ''; width: 1px; height: 24px;
  background: linear-gradient(180deg, var(--accent), transparent);
  display: inline-block; animation: ac-scroll-dot 2s ease-in-out infinite;
}
@keyframes ac-scroll-dot { 0%,100% { transform: translateY(0); opacity: 0.7; } 50% { transform: translateY(8px); opacity: 1; } }

/* === Chapters === */
.ac-chapter {
  padding: clamp(80px, 10vw, 140px) var(--gutter);
  border-top: 1px solid var(--line);
  position: relative;
}
.ac-chapter--alt { background: var(--bg-2); }

.ac-chapter-head {
  display: flex; align-items: baseline; gap: 24px;
  margin-bottom: clamp(48px, 6vw, 80px);
}
.ac-chapter-num {
  font-size: 11px; letter-spacing: 0.28em; color: var(--accent);
  font-weight: 600; white-space: nowrap;
}
.ac-chapter-rule { flex: 1; height: 1px; background: var(--line-2); }
.ac-chapter-title {
  font-family: Inter; font-weight: 200;
  font-size: var(--chapter-title); letter-spacing: -0.025em; margin: 0;
}

.ac-cols {
  display: grid; grid-template-columns: 1fr 1fr; gap: clamp(40px, 6vw, 80px);
  align-items: start;
}

.ac-body {
  font-size: var(--body); line-height: 1.7; color: var(--ink-dim);
  font-weight: 300; margin: 0 0 24px;
  text-wrap: pretty;
}
.ac-body-hi {
  font-size: clamp(22px, 2.6vw, 32px); line-height: 1.35; font-weight: 300;
  font-style: italic; color: var(--accent);
  text-shadow: 0 0 28px var(--accent-glow);
  margin: 32px 0 0;
}
.ac-body-lg {
  font-size: var(--body-lg); line-height: 1.45; font-weight: 200;
  margin: 0 0 28px; max-width: 1080px;
}
.ac-glow {
  font-style: italic; color: var(--accent);
  text-shadow: 0 0 18px var(--accent-glow);
}

/* Instrument card === */
.ac-instrument {
  border: 1px solid var(--line-2);
  background: linear-gradient(180deg, var(--bg-3) 0%, var(--bg-2) 100%);
  padding: clamp(20px, 2.6vw, 32px);
  position: relative;
}
.ac-instrument-head {
  display: flex; justify-content: space-between;
  font-size: 10px; letter-spacing: 0.22em; font-weight: 600;
  padding-bottom: 16px; border-bottom: 1px solid var(--line);
}
.ac-instrument-head .ok { color: var(--accent); }
.ac-instrument-foot {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  padding-top: 16px; border-top: 1px solid var(--line);
}
.ac-kv-k { font-size: 9px; letter-spacing: 0.2em; opacity: 0.45; }
.ac-kv-v { font-size: 16px; font-weight: 500; margin-top: 4px; color: var(--accent); }

/* Timeline === */
.ac-timeline {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: clamp(28px, 4vw, 60px);
  position: relative;
  padding-top: 60px;
  margin-top: clamp(40px, 5vw, 80px);
}
.ac-timeline::before {
  content: ''; position: absolute; top: 80px; left: 8px; right: 8px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
}
.ac-timeline-dot {
  width: 14px; height: 14px; border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 18px var(--accent); margin-bottom: 28px;
  position: relative; z-index: 1;
}
.ac-timeline-year {
  font-size: clamp(40px, 5vw, 56px); font-weight: 200;
  letter-spacing: -0.02em; margin-bottom: 12px;
}
.ac-timeline-title { font-size: clamp(16px, 1.4vw, 18px); font-weight: 500; margin-bottom: 8px; }
.ac-timeline-desc {
  font-size: clamp(14px, 1.1vw, 15px); line-height: 1.6;
  opacity: 0.6; font-weight: 300; max-width: 320px;
}

/* === Le Nom === */
.ac-wind {
  display: grid; grid-template-columns: 1.4fr 1fr;
  gap: clamp(40px, 5vw, 80px); align-items: center;
  margin-bottom: clamp(60px, 8vw, 100px);
}
.ac-wind-word {
  display: flex; gap: 6px; margin-bottom: 28px; flex-wrap: wrap;
}
.ac-wind-letter {
  font-size: clamp(56px, 9vw, 112px);
  font-weight: 200; letter-spacing: -0.04em; line-height: 1;
  display: inline-block;
  animation: ac-letter-in .8s cubic-bezier(.2,.8,.2,1) backwards;
}
.ac-wind-letter { color: var(--ink); }
.ac-wind-letter:nth-child(1) { animation-delay: .05s; }
.ac-wind-letter:nth-child(2) { animation-delay: .12s; }
.ac-wind-letter:nth-child(3) { animation-delay: .19s; }
.ac-wind-letter:nth-child(4) { animation-delay: .26s; color: var(--accent); }
.ac-wind-letter:nth-child(5) { animation-delay: .33s; }
.ac-wind-letter:nth-child(6) { animation-delay: .40s; }
.ac-wind-letter:nth-child(7) { animation-delay: .47s; }
@keyframes ac-letter-in { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

.ac-wind-def {
  font-size: clamp(15px, 1.4vw, 18px); line-height: 1.6;
  opacity: 0.7; font-weight: 300; max-width: 480px;
}
.ac-wind-def-lbl {
  font-style: italic; color: var(--accent); margin-right: 8px;
}
.ac-wind-rose { display: flex; justify-content: center; }
.ac-wind-rose svg { width: 100%; max-width: 420px; height: auto; }

/* === Products === */
.ac-products {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: clamp(16px, 2vw, 24px);
  margin-bottom: clamp(60px, 8vw, 100px);
}
.ac-product {
  border: 1px solid var(--line);
  padding: clamp(28px, 3vw, 40px) clamp(20px, 2vw, 24px) clamp(20px, 2vw, 28px);
  position: relative;
  background: rgba(0,0,0,0.015);
  transition: transform .5s cubic-bezier(.2,.8,.2,1), border-color .5s;
}
.ac-product:hover {
  transform: translateY(-8px);
  border-color: rgba(0,0,0,0.35);
}
.ac-product:hover .ac-product-glow { opacity: 1; }
.ac-product:hover .ac-product-img { transform: rotate(-4deg) scale(1.02); }

.ac-product-idx {
  position: absolute; top: 18px; left: clamp(20px, 2vw, 24px);
  font-size: 10px; letter-spacing: 0.22em; color: var(--accent); font-weight: 600;
}
.ac-product-img-wrap {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  position: relative; margin-bottom: 24px;
}
.ac-product-glow {
  position: absolute; inset: 12%;
  background: radial-gradient(circle, rgba(0,0,0,0.12), transparent 70%);
  filter: blur(24px); opacity: 0.55;
  transition: opacity .6s;
}
.ac-product-img {
  width: 100%; height: 100%; object-fit: contain;
  position: relative; z-index: 1;
  transition: transform .6s cubic-bezier(.2,.8,.2,1);
  filter: drop-shadow(0 18px 32px rgba(0,0,0,0.18));
}
.ac-product-meta {
  padding-top: 18px; border-top: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: baseline;
}
.ac-product-name {
  font-size: clamp(15px, 1.4vw, 18px); font-weight: 600; letter-spacing: 0.1em;
}
.ac-product-sub {
  font-size: 12px; opacity: 0.55; font-weight: 300; font-style: italic;
}

/* Spec block === */
.ac-specs { border-top: 1px solid var(--line-2); }
.ac-spec-row {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 0; border-bottom: 1px solid var(--line);
}
.ac-spec-row:last-child { border-bottom: none; }
.ac-spec-row-k {
  font-size: 11px; letter-spacing: 0.22em; opacity: 0.55;
  font-weight: 500; min-width: clamp(140px, 14vw, 180px);
}
.ac-spec-row-dots {
  flex: 1; height: 1px;
  background: repeating-linear-gradient(90deg, rgba(0,0,0,0.22) 0 2px, transparent 2px 6px);
}
.ac-spec-row-v { font-size: clamp(14px, 1.3vw, 16px); font-weight: 400; color: var(--accent); }

.ac-mt-32 { margin-top: 32px; }

/* === Quote === */
.ac-quote {
  padding: clamp(100px, 14vw, 180px) var(--gutter);
  text-align: center; position: relative;
  border-top: 1px solid var(--line);
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.04), transparent 60%);
  overflow: hidden;
}
.ac-quote::before {
  content: ''; position: absolute;
  top: clamp(40px, 6vw, 60px); left: clamp(20px, 4vw, 60px);
  right: clamp(20px, 4vw, 60px); bottom: clamp(40px, 6vw, 60px);
  border: 1px solid rgba(0,0,0,0.12); pointer-events: none;
}
.ac-quote-mark {
  font-size: clamp(120px, 16vw, 200px);
  font-family: Georgia, serif; line-height: 1; opacity: 0.15;
  color: var(--accent); margin-bottom: -40px;
}
.ac-quote-text {
  font-family: Inter; font-weight: 200;
  font-size: var(--quote-text); letter-spacing: -0.02em;
  line-height: 1.2; margin: 0 auto; max-width: 1100px;
  text-wrap: balance;
}
.ac-quote-author {
  margin-top: 48px;
  font-size: 13px; letter-spacing: 0.28em;
  opacity: 0.6; font-weight: 500;
}

/* Footer === */
.ac-footer {
  padding: 32px var(--gutter); display: flex;
  justify-content: space-between; gap: 24px; flex-wrap: wrap;
  font-size: 10px; letter-spacing: 0.22em; opacity: 0.6;
  border-top: 1px solid var(--line);
}

/* === Reveal animation === */
.ac-reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 1s cubic-bezier(.2,.8,.2,1), transform 1s cubic-bezier(.2,.8,.2,1);
}
.ac-reveal.is-visible {
  opacity: 1; transform: translateY(0);
}
.ac-reveal[data-delay="1"] { transition-delay: .08s; }
.ac-reveal[data-delay="2"] { transition-delay: .16s; }
.ac-reveal[data-delay="3"] { transition-delay: .24s; }

/* === Interactive watch dial === */
.ac-watch-dial {
  display: flex; justify-content: center; padding: 12px 0;
  cursor: crosshair;
}
.ac-watch-dial svg { transition: filter .4s; }
.ac-watch-dial:hover svg { filter: drop-shadow(0 0 18px var(--accent-glow)); }

/* === Responsive === */
@media (max-width: 1100px) {
  .ac-hero-content { grid-template-columns: 1fr; gap: 48px; }
  .ac-cols { grid-template-columns: 1fr; gap: 40px; }
  .ac-wind { grid-template-columns: 1fr; gap: 40px; }
  .ac-products { grid-template-columns: repeat(2, 1fr); }
  .ac-timeline { grid-template-columns: 1fr; gap: 40px; padding-top: 0; }
  .ac-timeline::before { display: none; }
  .ac-timeline-dot { margin-top: 0; }
}
@media (max-width: 720px) {
  .ac-nav-links { display: none; }
  .ac-products { grid-template-columns: 1fr; max-width: 420px; margin-left: auto; margin-right: auto; }
  .ac-spec-strip { grid-template-columns: repeat(2, 1fr); }
  .ac-spec:nth-child(2) { border-right: none; }
  .ac-hero-foot { font-size: 9px; }
  .ac-hero-foot span:nth-child(2) { display: none; }
  .ac-spec-row { flex-wrap: wrap; }
  .ac-spec-row-k { min-width: 0; flex-basis: 100%; margin-bottom: 4px; }
  .ac-spec-row-dots { display: none; }
}

  </style>

// Helper: render an array of string | {em} | {glow} fragments
function renderParts(parts) {
  return parts.map((p, i) => {
    if (typeof p === 'string') return p;
    if (p.em) return <em key={i}>{p.em}</em>;
    if (p.glow) return <em key={i} className="ac-glow">{p.glow}</em>;
    return null;
  });
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "animIntensity": 1
} /*EDITMODE-END*/;

function App() {
  const [t] = React.useState(TWEAK_DEFAULTS);
  const [scrollY, setScrollY] = React.useState(0);

  // Global scroll listener
  React.useEffect(() => {
    let raf = 0;
    const onScroll = () => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        setScrollY(window.scrollY);
        raf = 0;
      });
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  // Reveal-on-scroll observer
  React.useEffect(() => {
    const els = document.querySelectorAll('.ac-reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add('is-visible');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);

  // Horizon attitude — calm "in flight" oscillation, intensity-modulated
  const intensity = t.animIntensity;
  const roll = Math.sin(scrollY * 0.0022) * 16 * intensity;
  const pitch = Math.cos(scrollY * 0.0016) * 28 * intensity;

  return (
    <>


      <div className="ac-page">
        <Hero roll={roll} pitch={pitch} scrollY={scrollY} />
        <ChapterEnfance scrollY={scrollY} intensity={intensity} />
        <ChapterGenese />
        <ChapterNom scrollY={scrollY} intensity={intensity} />
        <ChapterConception />
        <Quote />
        <Footer />
      </div>
    </>);

}

// ===========================================================
// SVG Instruments
// ===========================================================

function ArtificialHorizon({ roll, pitch }) {
  return (
    <svg viewBox="-110 -110 220 220" className="ac-horizon-svg" aria-label="Horizon artificiel">
      <defs>
        <clipPath id="ah-clip-final"><circle cx="0" cy="0" r="80" /></clipPath>
        <linearGradient id="ah-sky-final" x1="0" y1="-1" x2="0" y2="0">
          <stop offset="0%" stopColor="#0a1f2e" />
          <stop offset="100%" stopColor="#1a3a52" />
        </linearGradient>
        <linearGradient id="ah-grnd-final" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#3a2616" />
          <stop offset="100%" stopColor="#1a0f06" />
        </linearGradient>
        <radialGradient id="ah-glass" cx="0.3" cy="0.3" r="0.7">
          <stop offset="0%" stopColor="rgba(255,255,255,0.15)" />
          <stop offset="60%" stopColor="rgba(255,255,255,0)" />
        </radialGradient>
      </defs>

      {/* Outer bezel */}
      <circle cx="0" cy="0" r="100" fill="#0a0a0a" stroke="#1a1a1a" strokeWidth="0.6" />
      <circle cx="0" cy="0" r="92" fill="none" stroke="#222" strokeWidth="0.3" />

      {/* Tick marks bezel */}
      {Array.from({ length: 36 }).map((_, i) => {
        const a = i * 10;
        const long = i % 3 === 0;
        return (
          <line key={i} x1="0" y1="-92" x2="0" y2={long ? -84 : -88}
          stroke={long ? '#ffffff' : '#444'} strokeWidth={long ? 0.8 : 0.4}
          transform={`rotate(${a})`} opacity={long ? 0.7 : 0.4} />);

      })}

      {/* Inner sphere */}
      <g clipPath="url(#ah-clip-final)" transform={`rotate(${roll})`}>
        <g transform={`translate(0 ${pitch})`}>
          <rect x="-200" y="-200" width="400" height="200" fill="url(#ah-sky-final)" />
          <rect x="-200" y="0" width="400" height="200" fill="url(#ah-grnd-final)" />
          <line x1="-200" y1="0" x2="200" y2="0" stroke="#fff" strokeWidth="0.6" />
          {[-40, -30, -20, -10, 10, 20, 30, 40].map((p) =>
          <g key={p}>
              <line x1={p % 20 === 0 ? -18 : -10} y1={p} x2={p % 20 === 0 ? 18 : 10} y2={p}
            stroke="#fff" strokeWidth="0.4" opacity="0.7" />
              {p % 20 === 0 &&
            <>
                  <text x="-22" y={p + 1.5} fill="#fff" fontSize="4" textAnchor="end" fontFamily="Inter" opacity="0.7">{Math.abs(p)}</text>
                  <text x="22" y={p + 1.5} fill="#fff" fontSize="4" textAnchor="start" fontFamily="Inter" opacity="0.7">{Math.abs(p)}</text>
                </>
            }
            </g>
          )}
        </g>
      </g>

      {/* Glass reflection */}
      <circle cx="0" cy="0" r="80" fill="url(#ah-glass)" pointerEvents="none" />

      {/* Aircraft symbol */}
      <g>
        <line x1="-30" y1="0" x2="-10" y2="0" stroke="#ffffff" strokeWidth="1.5" />
        <line x1="30" y1="0" x2="10" y2="0" stroke="#ffffff" strokeWidth="1.5" />
        <line x1="-10" y1="0" x2="-10" y2="4" stroke="#ffffff" strokeWidth="1.5" />
        <line x1="10" y1="0" x2="10" y2="4" stroke="#ffffff" strokeWidth="1.5" />
        <circle cx="0" cy="0" r="1.5" fill="#ffffff" />
      </g>

      {/* Roll pointers */}
      <g transform={`rotate(${roll})`}>
        <polygon points="0,-78 -3,-72 3,-72" fill="#ffffff" />
      </g>
      <polygon points="0,-92 -3,-98 3,-98" fill="#ffffff" />
    </svg>);

}

function Compass({ scrollY, intensity }) {
  const heading = (scrollY * 0.06 * intensity % 360 + 360) % 360;
  return (
    <div className="ac-watch-dial">
      <svg viewBox="-100 -100 200 200" width="100%" style={{ maxWidth: 280 }}>
        <circle cx="0" cy="0" r="92" fill="#0a0a0a" stroke="#1a1a1a" />
        <g transform={`rotate(${-heading})`}>
          <circle cx="0" cy="0" r="80" fill="#0d0d0d" stroke="#222" />
          {Array.from({ length: 72 }).map((_, i) => {
            const a = i * 5;
            const major = i % 6 === 0;
            return (
              <line key={i} x1="0" y1="-80" x2="0" y2={major ? -70 : -76}
              stroke={major ? '#ffffff' : '#555'} strokeWidth={major ? 1 : 0.4}
              transform={`rotate(${a})`} opacity={major ? 0.85 : 0.5} />);

          })}
          {['N', 'E', 'S', 'W'].map((d, i) =>
          <text key={d} x="0" y={-58} fill="#ffffff" fontSize="11"
          textAnchor="middle" fontFamily="Inter" fontWeight="700"
          transform={`rotate(${i * 90}) translate(0,3.5)`}>
              {d}
            </text>
          )}
        </g>
        {/* Lubber line */}
        <polygon points="0,-92 -4,-84 4,-84" fill="#ffffff" />
        <line x1="0" y1="-50" x2="0" y2="50" stroke="#ffffff" strokeWidth="0.4" opacity="0.3" />
        <line x1="-50" y1="0" x2="50" y2="0" stroke="#ffffff" strokeWidth="0.4" opacity="0.3" />
        <text x="0" y="20" fill="#fff" fontSize="14" textAnchor="middle"
        fontFamily="Inter" fontWeight="600">
          {String(Math.round(heading)).padStart(3, '0')}°
        </text>
      </svg>
    </div>);

}

function WindRose({ intensity, scrollY }) {
  const rot = scrollY * 0.06 * intensity;
  return (
    <svg viewBox="-100 -100 200 200">
      <g transform={`rotate(${rot})`}>
        {Array.from({ length: 16 }).map((_, i) => {
          const a = i * 22.5;
          const long = i % 2 === 0;
          const cardinal = i % 4 === 0;
          // Alternance noir / gris sur les pointes
          const dark = i % 2 === 0;
          const fillColor = dark ? '#0a0a0a' : '#888888';
          const strokeColor = dark ? '#0a0a0a' : '#888888';
          return (
            <g key={i} transform={`rotate(${a})`}>
              <polygon
                points={`0,-${cardinal ? 92 : long ? 75 : 60} -${cardinal ? 6 : 4},0 0,-${cardinal ? 20 : long ? 15 : 10} ${cardinal ? 6 : 4},0`}
                fill={fillColor}
                stroke={strokeColor}
                strokeWidth="0.5"
                opacity={cardinal ? 0.95 : long ? 0.75 : 0.55} />
              
            </g>);

        })}
        <circle cx="0" cy="0" r="14" fill="#ffffff" stroke="#0a0a0a" strokeWidth="0.5" />
        <text x="0" y="-95" fill="#0a0a0a" fontSize="8" textAnchor="middle"
        fontFamily="Inter" fontWeight="700">N</text>
      </g>
    </svg>);

}
